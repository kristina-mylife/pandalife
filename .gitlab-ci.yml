stages:
  - deploy
pages:
  image: alpine:latest
  stage: deploy
  script:
    - mkdir -p public
    - cp index.html manifest.json sw.js public/
    - cp -r css public/
    - cp -r js public/
    - cp -r images public/
    - cp -r icons public/
    - ls -la public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"